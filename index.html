<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Texture Color Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  body {
    font-family: "Times New Roman", serif;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
    transition: 0.3s;
  }

  body.light {
    background: #f1f5f9;
    color: black;
  }

  #dropArea {
    border: 2px dashed #3b82f6;
    padding: 30px;
    margin: 20px auto;
    width: 60%;
    border-radius: 12px;
    background: #1e293b;
  }

  body.light #dropArea {
    background: #e2e8f0;
  }

  input, button {
    margin: 10px;
    padding: 10px;
    border-radius: 8px;
    border: none;
  }

  button {
    background: #3b82f6;
    color: white;
    cursor: pointer;
  }

  .colorBox {
    width: 100px;
    height: 100px;
    margin: 10px auto;
    border: 2px solid white;
    border-radius: 10px;
  }

  .container {
    display: flex;
    gap: 20px;
    margin-top: 30px;
  }

  .box {
    width: 50%;
    height: 400px;
    overflow-y: auto;
    background: #1e293b;
    border-radius: 10px;
    padding: 10px;
  }

  body.light .box {
    background: #e2e8f0;
  }

  canvas, img {
    width: 110px;
    height: 110px;
    margin: 6px;
  }

  .palette {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }

  .palette-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 4px;
  }

  .color {
    width: 18px;
    height: 18px;
    border: 1px solid #000;
  }

  .text {
    font-size: 10px;
    white-space: pre;
  }

  .bottom {
    margin-top: 20px;
  }
</style>
</head>
<body>

<h1>Texture Color Converter</h1>

<button onclick="toggleMode()">Toggle Dark / Light</button>

<div id="dropArea">
  <p>Drag & Drop Images Here</p>
  <input type="file" id="upload" multiple accept="image/*">
</div>

<input type="color" id="colorPicker" value="#3b82f6" onchange="updateColorBox()">
<div id="colorBox" class="colorBox"></div>

<br>

<button onclick="processImages()">Convert</button>

<div class="container">
  <div class="box">
    <h3>Original</h3>
    <div id="originals"></div>
  </div>

  <div class="box">
    <h3>Converted</h3>
    <div id="converted"></div>
  </div>
</div>

<div class="bottom">
  <button onclick="downloadZip()">Download All as ZIP</button>
</div>

<script>
const fileInput = document.getElementById("upload");
const dropArea = document.getElementById("dropArea");

let stored = [];

updateColorBox();

function toggleMode() {
  document.body.classList.toggle("light");
}

function updateColorBox() {
  const color = document.getElementById("colorPicker").value;
  document.getElementById("colorBox").style.background = color;
}

// Drag & Drop
dropArea.addEventListener("dragover", e => {
  e.preventDefault();
  dropArea.style.background = "#334155";
});

dropArea.addEventListener("dragleave", () => {
  dropArea.style.background = "";
});

dropArea.addEventListener("drop", e => {
  e.preventDefault();
  fileInput.files = e.dataTransfer.files;
  showOriginals();
});

fileInput.addEventListener("change", showOriginals);

// Show original images + palette
function showOriginals() {
  const box = document.getElementById("originals");
  box.innerHTML = "";

  Array.from(fileInput.files).forEach(file => {
    const wrap = document.createElement("div");

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);

    const pal = document.createElement("div");
    pal.className = "palette";

    img.onload = () => {
      getPalette(img).forEach(c => {
        pal.appendChild(createPaletteItem(c));
      });
    };

    wrap.appendChild(img);
    wrap.appendChild(pal);
    box.appendChild(wrap);
  });
}

// Convert images
function processImages() {
  const files = fileInput.files;
  const target = hexToRgb(document.getElementById("colorPicker").value);
  const box = document.getElementById("converted");

  box.innerHTML = "";
  stored = [];

  Array.from(files).forEach(file => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const c = document.createElement("canvas");
      const ctx = c.getContext("2d");

      c.width = img.width;
      c.height = img.height;

      ctx.drawImage(img, 0, 0);

      const data = ctx.getImageData(0, 0, c.width, c.height);
      const d = data.data;

      for (let i = 0; i < d.length; i += 4) {
        const avg = (d[i] + d[i+1] + d[i+2]) / 3 / 255;
        d[i] = target.r * avg;
        d[i+1] = target.g * avg;
        d[i+2] = target.b * avg;
      }

      ctx.putImageData(data, 0, 0);

      stored.push({canvas: c, name: file.name});

      const wrap = document.createElement("div");

      const pal = document.createElement("div");
      pal.className = "palette";

      getPaletteFromCanvas(c).forEach(col => {
        pal.appendChild(createPaletteItem(col));
      });

      const btn = document.createElement("button");
      btn.textContent = "Download";
      btn.onclick = () => {
        const a = document.createElement("a");
        a.href = c.toDataURL();
        a.download = "converted_" + file.name;
        a.click();
      };

      wrap.appendChild(c);
      wrap.appendChild(pal);
      wrap.appendChild(btn);

      box.appendChild(wrap);
    };

    reader.readAsDataURL(file);
  });
}

// ZIP download
function downloadZip() {
  if (!stored.length) return alert("No converted images!");

  const zip = new JSZip();

  stored.forEach(item => {
    const base64 = item.canvas.toDataURL().split(",")[1];
    zip.file(item.name, base64, { base64: true });
  });

  zip.generateAsync({ type: "blob" }).then(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "textures.zip";
    a.click();
  });
}

// Palette helpers
function createPaletteItem(c) {
  const wrap = document.createElement("div");
  wrap.className = "palette-item";

  const box = document.createElement("div");
  box.className = "color";
  box.style.background = rgbToHex(c.r, c.g, c.b);

  const text = document.createElement("div");
  text.className = "text";
  text.innerText = `${rgbToHex(c.r,c.g,c.b)}\nrgb(${c.r},${c.g},${c.b})`;

  wrap.appendChild(box);
  wrap.appendChild(text);

  return wrap;
}

function getPalette(img) {
  const c = document.createElement("canvas");
  const ctx = c.getContext("2d");

  c.width = 50;
  c.height = 50;
  ctx.drawImage(img, 0, 0, 50, 50);

  return extract(ctx.getImageData(0, 0, 50, 50).data);
}

function getPaletteFromCanvas(c) {
  const ctx = c.getContext("2d");
  return extract(ctx.getImageData(0, 0, 50, 50).data);
}

function extract(data) {
  const map = {};

  for (let i = 0; i < data.length; i += 40) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    const hex = rgbToHex(r, g, b);
    map[hex] = { r, g, b };
  }

  return Object.values(map).slice(0, 6);
}

function rgbToHex(r,g,b) {
  return "#" + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}
</script>

</body>
</html>
